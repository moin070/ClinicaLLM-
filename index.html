                        {/* Right Clinical Advisor Sidebar */}
                        <aside className={`w-[420px] bg-white dark:bg-[#111827] flex flex-col shrink-0 overflow-hidden z-10 transition-all ${isFullScreen ? 'hidden' : 'flex'}`}>
                            <div className="h-12 border-b border-clinical-border dark:border-slate-800 flex items-center justify-between px-4 shrink-0 bg-slate-50 dark:bg-slate-900/60">
                                <h2 className="text-xs font-bold text-clinical-text dark:text-slate-200 flex items-center gap-2">
                                    <StethoscopeIcon className="w-4 h-4 text-clinical-teal" /> Conversational Copilot
                                </h2>
                                
                                {/* Layman vs Physician Mode */}
                                <div className="flex bg-slate-200 dark:bg-slate-800 p-0.5 rounded text-xs font-medium">
                                    <button 
                                        onClick={() => { setPersona('patient'); triggerToast("Set to Patient layman vocabulary"); }} 
                                        className={`px-2 py-0.5 rounded text-[10px] transition-all font-semibold ${persona === 'patient' ? 'bg-clinical-teal text-white shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:text-slate-800'}`}
                                    >
                                        Patient Mode
                                    </button>
                                    <button 
                                        onClick={() => { setPersona('physician'); triggerToast("Set to Physician professional parameters"); }} 
                                        className={`px-2 py-0.5 rounded text-[10px] transition-all font-semibold ${persona === 'physician' ? 'bg-clinical-teal text-white shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:text-slate-800'}`}
                                    >
                                        Physician Mode
                                    </button>
                                </div>
                            </div>

                            {/* Chat messages */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50 dark:bg-[#0f172a]/25">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-2.5 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-7 h-7 rounded flex items-center justify-center shrink-0 text-xs ${msg.role === 'user' ? 'bg-[#0f172a] dark:bg-slate-200 text-white dark:text-[#0f172a]' : 'bg-clinical-lightteal dark:bg-slate-800 text-clinical-teal'}`}>
                                            {msg.role === 'user' ? <UserIcon className="w-4 h-4" /> : <StethoscopeIcon className="w-4 h-4" />}
                                        </div>
                                        <div className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                            <div className={`px-3 py-2.5 rounded shadow-sm border text-xs leading-relaxed ${msg.role === 'user' ? 'bg-clinical-teal text-white border-transparent' : 'bg-white dark:bg-slate-800 border-clinical-border dark:border-slate-800 text-slate-800 dark:text-slate-100 w-full'}`}>
                                                {msg.role === 'user' ? (
                                                    <div className="whitespace-pre-wrap">{msg.text}</div>
                                                ) : (
                                                    <ChatMessageContent text={msg.text} onReferenceClick={handleReferenceClick} />
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex gap-2.5">
                                        <div className="w-7 h-7 bg-clinical-lightteal dark:bg-slate-800 rounded text-clinical-teal flex items-center justify-center shrink-0">
                                            <LoaderIcon className="w-4 h-4" />
                                        </div>
                                        <div className="bg-white dark:bg-slate-800 border border-clinical-border dark:border-slate-800 px-3 py-2.5 rounded text-xs text-clinical-muted dark:text-slate-400 font-mono shadow-sm">
                                            Analyzing diagnostics...
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 bg-white dark:bg-slate-900 border-t border-clinical-border dark:border-slate-800">
                                <form onSubmit={handleFormSubmit} className="relative flex items-end gap-2 bg-slate-50 dark:bg-[#111827] border border-clinical-border dark:border-slate-800 focus-within:border-clinical-teal dark:focus-within:border-clinical-teal transition-all p-1.5 rounded">
                                    <textarea
                                        value={input} onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                                        placeholder={!isApiConnected ? "Insert health model key..." : `Ask about indicators (${persona === 'patient' ? 'Patient' : 'Clinician'} vocabulary)...`}
                                        disabled={!isApiConnected}
                                        className="w-full bg-transparent border-none focus:ring-0 resize-none max-h-24 min-h-[36px] py-1 px-2 text-xs text-clinical-text dark:text-white placeholder-clinical-muted outline-none disabled:opacity-50"
                                        rows="1"
                                    />
                                    <button type="submit" disabled={loading || !input.trim() || !isApiConnected} className="w-8 h-8 flex items-center justify-center bg-clinical-teal hover:bg-clinical-darkteal text-white disabled:bg-slate-300 dark:disabled:bg-slate-800 transition-colors shrink-0 rounded">
                                        <SendIcon className="w-4.5 h-4.5" />
                                    </button>
                                </form>
                            </div>
                        </aside>
                    </main>

                    {/* Pop-up clinical toast notification */}
                    {toast && (
                        <div className="fixed bottom-6 left-6 z-50 animate-bounce">
                            <div className={`px-4 py-2.5 rounded shadow-lg border text-xs font-semibold flex items-center gap-2 ${
                                toast.type === "error" 
                                ? "bg-rose-50 text-rose-700 border-rose-200 dark:bg-rose-950/40 dark:text-rose-300 dark:border-rose-800" 
                                : "bg-teal-50 text-teal-800 border-teal-200 dark:bg-teal-950/40 dark:text-teal-300 dark:border-teal-850"
                            }`}>
                                <ShieldCheckIcon className="w-4 h-4 text-clinical-teal" />
                                {toast.message}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
