<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaLLM - Clinical Medical Report Copilot</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Helvetica Neue"', 'Helvetica', 'sans-serif'],
                        serif: ['Georgia', '"Times New Roman"', 'Times', 'serif'],
                        mono: ['Consolas', '"Courier New"', 'monospace']
                    },
                    colors: {
                        clinical: {
                            teal: '#0d9488', // Medical primary teal
                            darkteal: '#0f766e',
                            lightteal: '#f0fdfa',
                            bg: '#f8fafc',
                            sidebar: '#f1f5f9',
                            border: '#e2e8f0',
                            text: '#0f172a',
                            muted: '#475569',
                            link: '#0284c7'
                        }
                    }
                } 
            }
        }
    </script>
    
    <!-- React & ReactDOM (UMD globals) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset('react-classic', {
            presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
        });
    </script>

    <!-- PDF.js (Loads Native PDF Renderer for medical records) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* Custom clinical scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Drag-to-pan mindmap styles */
        .mindmap-container { touch-action: none; user-select: none; }
        
        body { font-size: 14px; }
        
        /* Pulse diagnostic styling */
        .clinical-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden bg-clinical-bg dark:bg-[#0f172a] text-clinical-text dark:text-[#f1f5f9] antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic,env">
        const { useState, useRef, useEffect, useCallback } = React;

        // Medical Icons SVG Set
        const HeartPulseIcon = ({ className = "w-5 h-5" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l1.5-4.5 2 9 1.5-4.5h3.27"/></svg>;

        const ClipboardIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>;
        const ShieldCheckIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 11 11 13 15 9"/></svg>;
        const BrainIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-3.12 3 3 0 0 1 0-4.88 2.5 2.5 0 0 1 0-3.12A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-3.12 3 3 0 0 0 0-4.88 2.5 2.5 0 0 0 0-3.12A2.5 2.5 0 0 0 14.5 2Z"/></svg>;
        const AlertIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const UploadIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const TrashIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const SendIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const SparklesIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const LoaderIcon = ({ className = "animate-spin w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
        const MoonIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const SunIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>;
        const ChevronLeftIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRightIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const NetworkIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
        const ClockIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const ZoomInIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const ZoomOutIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const MaximizeIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;
        const MinimizeIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>;
        const UserIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const DownloadIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Highly qualitative, medically sound mock records to try immediately
        const CLINICAL_MOCK_DATA = [
            {
                id: 'mock-1',
                name: 'comprehensive_metabolic_panel.md',
                type: 'markdown',
                content: `# METABOLIC & LIPID PANEL DIAGNOSTIC REPORT
**Patient:** Arthur Pendelton | **DOB:** 04/12/1978 | **Date:** Oct 15, 2025

## Summary of Out-of-Range Clinical Findings
*   **Fasting Serum Glucose:** 118 mg/dL *(High | Ref range: 70 - 99 mg/dL)*
*   **HbA1c (Glycated Hemoglobin):** 5.9% *(High / Prediabetic range | Ref: < 5.7%)*
*   **Serum 25-Hydroxyvitamin D:** 18.2 ng/mL *(Deficient | Ref range: 30.0 - 100.0 ng/mL)*
*   **Total Cholesterol:** 224 mg/dL *(Elevated | Ref: < 200 mg/dL)*
*   **LDL Cholesterol:** 142 mg/dL *(Borderline High | Ref: < 100 mg/dL)*

## Clinical Interpretation & Notes
Patient exhibits borderline glycemic profiles indicative of early-stage insulin resistance or impaired fasting glucose (Prediabetes). Concurrently, severe Vitamin D deficiency requires clinical correction to support metabolic and bone homeostasis. LDL cholesterol is elevated, and cardiac risk is currently moderated, though dietetic changes are strongly recommended.

## Recommended Follow-ups & Actions
1. Re-evaluate fasting plasma glucose and HbA1c in 90 days.
2. Initiate clinical cholecalciferol supplementation (Vitamin D3) at 5,000 IU daily with food.
3. Establish dynamic aerobic and physical resistance program of 150 minutes/week.
4. Dietary consultation to lower glycemic load and saturated fat profile.`,
                isSelected: true
            },
            {
                id: 'mock-2',
                name: 'knee_mri_radiology.md',
                type: 'markdown',
                content: `# CLINICAL RADIOLOGY REPORT: RIGHT KNEE MRI
**Patient:** Arthur Pendelton | **Date:** Nov 12, 2025 | **Referred by:** Dr. Sarah Lin (Orthopedics)

## Clinical History
Right knee trauma following minor twisting deceleration during low-impact activity. Persistent lateral-focused discomfort and mild swelling.

## Findings & Systemic Evaluation
*   **Bone Marrow:** Normal signal intensity. No traumatic contusion or osteochondral defect is noted in the weightbearing compartments.
*   **Ligaments:** The anterior cruciate ligament (ACL) and posterior cruciate ligament (PCL) are intact with normal signals.
*   **Medial Collateral Ligament (MCL):** Shows focal thickening and surrounding soft tissue hyperintensity, consistent with a Grade II Sprain. No complete discontinuity found.
*   **Menisci:** Mild horizontal tear of the posterior horn of the medial meniscus. The lateral meniscus is intact.
*   **Joint Effusion:** Mild fluid distension within the patellofemoral recess is observed.

## Diagnostic Conclusion
1. Grade II Sprain of the Medial Collateral Ligament (MCL).
2. Mild localized joint effusion.
3. Mild horizontal signal alterance in the medial meniscus posterior horn; clinical correlation recommended.`,
                isSelected: false
            }
        ];

        // Exponential backoff API runner
        const fetchWithRetry = async (url, options, retries = 5) => {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData?.error?.message || `Clinical API error ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await sleep(delay);
                    delay *= 2;
                }
            }
        };

        const SimpleClinicalMarkdown = ({ content }) => {
            const createMarkup = (text) => {
                let html = text
                    .replace(/^### (.*$)/gim, '<h3 class="text-md font-semibold mt-4 mb-1.5 text-clinical-teal">$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2 class="text-lg font-bold mt-5 mb-2 border-b pb-1 border-slate-200 dark:border-slate-700 text-clinical-text dark:text-teal-400">$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1 class="text-xl font-bold mt-5 mb-3 text-clinical-darkteal dark:text-teal-300">$1</h1>')
                    .replace(/\*\*(.*?)\*\*/gim, '<strong class="font-bold text-clinical-darkteal dark:text-teal-200">$1</strong>')
                    .replace(/\*(.*?)\*/gim, '<em class="italic text-slate-700 dark:text-slate-300">$1</em>')
                    .replace(/`(.*?)`/gim, '<code class="bg-teal-50 dark:bg-slate-800 text-teal-800 dark:text-teal-300 px-1.5 py-0.5 rounded text-[12px] font-mono">$1</code>')
                    .replace(/\n\n/gim, '</p><p class="mb-3 leading-relaxed">')
                    .replace(/\n/gim, '<br/>');
                return { __html: `<p class="mb-3 leading-relaxed">${html}</p>` };
            };
            return <div dangerouslySetInnerHTML={createMarkup(content)} className="font-sans text-sm" />;
        };

        // Mindmap System Renderer (Bio-Conceptual Network)
        const MindmapNode = ({ node }) => {
            if (!node || !node.name) return null;
            return (
                <div className="flex items-center">
                    <div className="relative group">
                        <div className="bg-white dark:bg-[#1e293b] border border-clinical-teal/50 dark:border-clinical-teal/80 px-4 py-3 rounded shadow-md hover:border-clinical-teal transition-all min-w-[140px] max-w-[240px] text-center cursor-help z-10 relative">
                            <p className="font-bold text-sm text-clinical-teal dark:text-teal-300 leading-snug">{node.name}</p>
                            {node.severity && (
                                <span className={`inline-block mt-1 text-[10px] px-2 py-0.5 rounded font-semibold ${
                                    node.severity === 'high' ? 'bg-rose-100 text-rose-700 dark:bg-rose-950/40 dark:text-rose-300' :
                                    node.severity === 'moderate' ? 'bg-amber-100 text-amber-700 dark:bg-amber-950/40 dark:text-amber-300' :
                                    'bg-teal-100 text-teal-700 dark:bg-teal-950/40 dark:text-teal-300'
                                }`}>
                                    {node.severity.toUpperCase()}
                                </span>
                            )}
                        </div>
                        <div className="absolute z-50 left-1/2 -translate-x-1/2 bottom-full mb-3 w-64 bg-[#0f172a] dark:bg-slate-200 text-white dark:text-slate-900 text-xs p-3 rounded shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-opacity duration-200 text-left pointer-events-none font-sans">
                            <p className="font-bold border-b border-slate-700 dark:border-slate-300 pb-1 mb-1">{node.name}</p>
                            <p className="opacity-90">{node.description}</p>
                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#0f172a] dark:border-t-slate-200"></div>
                        </div>
                    </div>
                    {node.children && node.children.length > 0 && (
                        <div className="flex flex-col gap-5 pl-10 relative py-3">
                            {node.children.map((child, idx) => {
                                const isFirst = idx === 0;
                                const isLast = idx === node.children.length - 1;
                                const isOnly = node.children.length === 1;
                                return (
                                    <div key={idx} className="relative flex items-center">
                                        <div className="absolute -left-10 top-1/2 w-10 h-[2px] bg-slate-300 dark:bg-slate-700 z-0"></div>
                                        {!isOnly && (
                                            <div className={`absolute -left-10 w-[2px] bg-slate-300 dark:bg-slate-700 z-0
                                                ${isFirst ? 'top-1/2 h-1/2' : isLast ? 'bottom-1/2 h-1/2' : 'top-0 h-full'}
                                            `}></div>
                                        )}
                                        <MindmapNode node={child} />
                                    </div>
                                )
                            })}
                        </div>
                    )}
                </div>
            )
        };

        const ChatMessageContent = ({ text, onReferenceClick }) => {
            const lines = text.split('\n');
            return (
                <div className="space-y-2 text-[14px] leading-relaxed font-sans">
                    {lines.map((line, i) => {
                        let isBullet = false;
                        let content = line;
                        if (line.trim().startsWith('* ') || line.trim().startsWith('- ')) {
                            isBullet = true;
                            content = line.trim().substring(2);
                        }
                        const parseInline = (str) => {
                            const elements = [];
                            let lastIndex = 0;
                            const inlineRegex = /(\*\*.*?\*\*|`.*?`|\[\[.*?\]\])/g;
                            let match; let keyCounter = 0;
                            while ((match = inlineRegex.exec(str)) !== null) {
                                if (match.index > lastIndex) elements.push(<span key={`t-${keyCounter++}`}>{str.substring(lastIndex, match.index)}</span>);
                                const matchedStr = match[0];
                                if (matchedStr.startsWith('**') && matchedStr.endsWith('**')) {
                                    elements.push(<strong key={`b-${keyCounter++}`} className="font-bold text-clinical-darkteal dark:text-teal-300">{matchedStr.slice(2, -2)}</strong>);
                                } else if (matchedStr.startsWith('`') && matchedStr.endsWith('`')) {
                                    elements.push(<code key={`c-${keyCounter++}`} className="bg-teal-50 dark:bg-slate-800 border border-teal-100 dark:border-slate-700 text-teal-800 dark:text-teal-300 px-1 py-0.5 rounded text-[12px] font-mono">{matchedStr.slice(1, -1)}</code>);
                                } else if (matchedStr.startsWith('[[') && matchedStr.endsWith(']]')) {
                                    const citeContent = matchedStr.slice(2, -2);
                                    elements.push(
                                        <button 
                                            key={`cite-${keyCounter++}`} 
                                            onClick={() => onReferenceClick(citeContent)}
                                            className="inline-flex items-center gap-1 text-clinical-link dark:text-sky-400 font-semibold hover:underline bg-sky-50 dark:bg-slate-800 px-1.5 py-0 rounded text-xs mx-1 transition-colors cursor-pointer align-baseline"
                                            title="View Section Reference"
                                        >
                                            <ClipboardIcon className="w-2.5 h-2.5" /> {citeContent}
                                        </button>
                                    );
                                }
                                lastIndex = inlineRegex.lastIndex;
                            }
                            if (lastIndex < str.length) elements.push(<span key={`t-${keyCounter++}`}>{str.substring(lastIndex)}</span>);
                            return elements;
                        };

                        if (isBullet) return <li key={i} className="ml-5 list-disc marker:text-clinical-teal">{parseInline(content)}</li>;
                        if (content.startsWith('### ')) return <h3 key={i} className="font-bold mt-3 text-clinical-darkteal dark:text-teal-400">{parseInline(content.slice(4))}</h3>;
                        if (content.startsWith('## ')) return <h2 key={i} className="font-bold mt-4 border-b border-slate-200 dark:border-slate-800 pb-1 text-clinical-teal">{parseInline(content.slice(3))}</h2>;
                        if (content.startsWith('# ')) return <h1 key={i} className="font-bold mt-5 text-clinical-darkteal">{parseInline(content.slice(2))}</h1>;
                        return content.trim() ? <p key={i}>{parseInline(content)}</p> : <div key={i} className="h-1" />;
                    })}
                </div>
            );
        };

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [docs, setDocs] = useState(CLINICAL_MOCK_DATA);
            const [viewingDocId, setViewingDocId] = useState('mock-1');
            
            const [viewMode, setViewMode] = useState('document'); // document | biomarker_graph | treatment_timeline
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [persona, setPersona] = useState('patient'); // patient | physician
            
            const [messages, setMessages] = useState([
                { role: 'assistant', text: 'Welcome to **ClinicaLLM**. Upload medical records, lab parameters, or radiology reports to start analysis.\n\nI can **explain complex biomarkers**, translate anatomical findings to simplified terms, compile chronological **Treatment Timelines**, or generate interconnected biological graphs.' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            // API Configuration
            const [apiKeyInput, setApiKeyInput] = useState('');
            const [activeApiKey, setActiveApiKey] = useState('');
            const [isApiConnected, setIsApiConnected] = useState(false);
            const [isValidatingApi, setIsValidatingApi] = useState(false);
            const [showApiInput, setShowApiInput] = useState(true);
            const [apiError, setApiError] = useState('');
            const [toast, setToast] = useState(null);

            // PDF States
            const [pdfInstance, setPdfInstance] = useState(null);
            const [pdfPageNum, setPdfPageNum] = useState(1);
            const [pdfNumPages, setPdfNumPages] = useState(0);
            const [pdfLoading, setPdfLoading] = useState(false);
            const [pdfError, setPdfError] = useState(null);
            const [highlightData, setHighlightData] = useState(null);
            const [flashViewer, setFlashViewer] = useState(false);

            // Mindmap / Graph State
            const [mindmapData, setMindmapData] = useState(null);
            const [isGeneratingMindmap, setIsGeneratingMindmap] = useState(false);
            const [mindmapError, setMindmapError] = useState(null);
            const [mindmapScale, setMindmapScale] = useState(1);
            const [mindmapPan, setMindmapPan] = useState({ x: 0, y: 0 });

            // Timeline State
            const [timelineData, setTimelineData] = useState(null);
            const [isGeneratingTimeline, setIsGeneratingTimeline] = useState(false);
            const [timelineError, setTimelineError] = useState(null);

            const fileInputRef = useRef(null);
            const messagesEndRef = useRef(null);
            const canvasRef = useRef(null);
            
            // Drag State for Visualizers
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);
            
            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // Clear visual data when selected documents update
            useEffect(() => {
                setMindmapData(null); setMindmapError(null); setMindmapScale(1); setMindmapPan({x:0, y:0});
                setTimelineData(null); setTimelineError(null);
            }, [docs.map(d => d.isSelected ? d.id : '').join(',')]);

            const viewingDoc = docs.find(d => d.id === viewingDocId);
            useEffect(() => {
                if (!window.pdfjsLib || !viewingDoc || viewingDoc.type !== 'pdf') return;
                let isActive = true;
                setPdfLoading(true); setPdfError(null); setPdfInstance(null);
                
                const loadingTask = window.pdfjsLib.getDocument({ data: viewingDoc.data });
                loadingTask.promise.then((pdf) => {
                    if (!isActive) return;
                    setPdfInstance(pdf); setPdfNumPages(pdf.numPages); setPdfPageNum(1); setPdfLoading(false);
                }).catch(err => {
                    if (!isActive) return;
                    console.error("PDF Load Error", err);
                    setPdfError("Interactive PDF renderer was unable to draw this page. The Clinical LLM can still analyze its raw elements.");
                    setPdfLoading(false);
                });
                return () => { isActive = false; loadingTask.destroy(); };
            }, [viewingDoc]);

            // Render selected page to Canvas element
            useEffect(() => {
                if (!pdfInstance || !canvasRef.current || viewMode !== 'document') return;
                let renderTask = null; let isActive = true;
                const renderPage = async () => {
                    try {
                        const page = await pdfInstance.getPage(pdfPageNum);
                        if (!isActive) return;
                        
                        const containerWidth = Math.max((canvasRef.current.parentElement.clientWidth || 800) - 48, 400);
                        const unscaledViewport = page.getViewport({ scale: 1 });
                        const scale = Math.min(1.5, containerWidth / unscaledViewport.width);
                        
                        const viewport = page.getViewport({ scale });
                        const canvas = canvasRef.current;
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        
                        renderTask = page.render({ canvasContext: context, viewport: viewport });
                        await renderTask.promise;
                    } catch (e) {
                        if (e.name !== 'RenderingCancelledException') console.error('Render error:', e);
                    }
                };
                renderPage();
                return () => { isActive = false; if (renderTask) renderTask.cancel(); };
            }, [pdfInstance, pdfPageNum, isDarkMode, viewMode]);

            const triggerToast = (message, type = "success") => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            const handleMouseUp = () => {
                if (viewMode !== 'document') return;
                const selection = window.getSelection();
                const text = selection.toString().trim();
                if (text.length > 4) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    setHighlightData({ text, top: rect.top - 45, left: rect.left + (rect.width / 2) - 50 });
                } else setHighlightData(null);
            };

            // Setup custom API keys or rely on system injected Keys
            const validateApiKey = async () => {
                if (!apiKeyInput.trim()) {
                    // Try to auto-connect using blank key parameters
                    setIsApiConnected(true); setActiveApiKey(''); setShowApiInput(false);
                    triggerToast("Using Platform auto-injected model engine.");
                    return;
                }
                setIsValidatingApi(true); setApiError('');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKeyInput.trim()}`);
                    if (res.ok) {
                        setIsApiConnected(true); setActiveApiKey(apiKeyInput.trim()); setShowApiInput(false); setApiError('');
                        triggerToast("Clinician AI Core established.");
                    } else throw new Error("Invalid medical license key");
                } catch (err) {
                    setIsApiConnected(false); setApiError('Validation Failed. Check key or platform parameters.');
                } finally { setIsValidatingApi(false); }
            };

            const bypassApiKey = () => {
                setIsApiConnected(true); setActiveApiKey(''); setShowApiInput(false);
                triggerToast("Connected successfully using built-in model pipeline.");
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                let newDocs = [...docs]; let errorMsg = null;
                for (let file of files) {
                    if (newDocs.length >= 7) { errorMsg = "Max 7 medical documents allowed in context."; break; }
                    if (file.size > 15 * 1024 * 1024) { errorMsg = `File ${file.name} too large (max 15MB).`; continue; }
                    
                    const isPdf = file.type === 'application/pdf';
                    const reader = new FileReader();
                    const fileProcessed = new Promise((resolve) => {
                        if (isPdf) {
                            reader.onload = (event) => {
                                const arrayBuffer = event.target.result;
                                let binary = ''; const bytes = new Uint8Array(arrayBuffer);
                                for (let i = 0; i < bytes.byteLength; i += 8192) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
                                resolve({ id: generateId(), name: file.name, type: 'pdf', data: new Uint8Array(arrayBuffer), base64: window.btoa(binary), isSelected: true });
                            };
                            reader.readAsArrayBuffer(file);
                        } else {
                            reader.onload = (event) => resolve({ id: generateId(), name: file.name, type: file.name.endsWith('.md') ? 'markdown' : 'text', content: event.target.result, isSelected: true });
                            reader.readAsText(file);
                        }
                    });
                    newDocs.push(await fileProcessed);
                }
                setDocs(newDocs);
                if (newDocs.length > 0) setViewingDocId(newDocs[newDocs.length - 1].id);
                if (errorMsg) triggerToast(errorMsg, "error");
                else triggerToast("Reports added to patient profile.");
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const toggleDocSelection = (id) => {
                setDocs(docs.map(doc => {
                    if (doc.id === id) {
                        return { ...doc, isSelected: !doc.isSelected };
                    }
                    return doc;
                }));
            };

            const deleteDoc = (id) => {
                const filtered = docs.filter(doc => doc.id !== id);
                setDocs(filtered);
                if (viewingDocId === id) setViewingDocId(filtered.length > 0 ? filtered[0].id : null);
                setHighlightData(null);
                triggerToast("Document removed.");
            };

            const handleReferenceClick = (citeText) => {
                const cleanCite = citeText.replace(/\[\[|\]\]/g, '');
                const parts = cleanCite.split(',');
                const docName = parts[0].trim();
                const targetDoc = docs.find(d => d.name.toLowerCase().includes(docName.toLowerCase()));
                
                if (targetDoc) {
                    setViewMode('document');
                    setViewingDocId(targetDoc.id);
                    setFlashViewer(true);
                    setTimeout(() => setFlashViewer(false), 800);
                    triggerToast(`Navigated context to: ${targetDoc.name}`);
                }
            };

            const buildContextParts = (selectedDocs, promptStr) => {
                let parts = [];
                if (selectedDocs.length > 0) {
                    parts.push({ text: "--- Patient Health Record Registry Begin ---\n" });
                    selectedDocs.forEach(doc => {
                        if (doc.type === 'pdf') {
                            parts.push({ text: `\n[Report Record: ${doc.name} (Binary Content Enclosed)]\n` });
                            parts.push({ inlineData: { mimeType: 'application/pdf', data: doc.base64 } });
                        } else {
                            parts.push({ text: `\n[Report Record: ${doc.name}]\n${doc.content}\n` });
                        }
                    });
                    parts.push({ text: "\n--- Patient Health Record Registry End ---\n\n" });
                }
                parts.push({ text: promptStr });
                return parts;
            };

            const generateMindmap = async () => {
                if (!isApiConnected) { alert("Please connect system AI model config."); setShowApiInput(true); return; }
                const selectedDocs = docs.filter(doc => doc.isSelected);
                if (selectedDocs.length === 0) { setMindmapError("Ensure reports are checked in the left sidebar."); return; }

                setIsGeneratingMindmap(true); setMindmapError(null); setMindmapScale(1); setMindmapPan({x:0, y:0});
                const parts = buildContextParts(selectedDocs, 
                    `Analyze patient health reports. Identify key out-of-range parameters, physiological systems affected, and direct diagnostic nodes. Return STRICTLY a JSON format for a bio-conceptual knowledge graph/mindmap.
                    
                    SCHEMA format:
                    {
                      "name": "Global Patient Summary or Core Issue",
                      "description": "Short diagnostic overview of main findings.",
                      "severity": "high" | "moderate" | "normal",
                      "children": [
                        {
                          "name": "System/Marker (e.g. Endocrine System, MCL Ligament)",
                          "severity": "high" | "moderate" | "normal",
                          "description": "Short detail explaining findings.",
                          "children": []
                        }
                      ]
                    }
                    Keep the depth logic strictly to 2-3 levels max so it remains fully readable. Return only the parsable JSON structure, no markdown wrappers.`
                );

                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } }) });
                    let jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("No payload parsed.");
                    if (jsonText.startsWith('```json')) jsonText = jsonText.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                    setMindmapData(JSON.parse(jsonText.trim()));
                } catch (err) { setMindmapError(`Dynamic map synthesis failed: ${err.message}`); } 
                finally { setIsGeneratingMindmap(false); }
            };

            const generateTimeline = async () => {
                if (!isApiConnected) { alert("Please connect system AI model config."); setShowApiInput(true); return; }
                const selectedDocs = docs.filter(doc => doc.isSelected);
                if (selectedDocs.length === 0) { setTimelineError("Ensure reports are checked in the left sidebar."); return; }

                setIsGeneratingTimeline(true); setTimelineError(null);
                const parts = buildContextParts(selectedDocs,
                    `Deconstruct the provided patient medical history, clinic notes, and lab records. Establish a logical clinical care timeline mapping symptoms, diagnostics, active treatments, and follow-ups chronologically.
                    
                    Return STRICTLY a JSON array structure matching this schema:
                    [
                      {
                        "phase": "Diagnostic phase (e.g., initial baseline panel, specialty evaluation)",
                        "date": "Estimated Month/Year or Date",
                        "milestone": "Core Finding or Clinical Event",
                        "details": [
                          "Detailed clinical note or parameter outcome",
                          "Actionable care direction"
                        ]
                      }
                    ]
                    Generate between 3-6 logical steps representing the patient journey. Return strictly the JSON without markdown code blocks.`
                );

                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } }) });
                    let jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("No payload parsed.");
                    if (jsonText.startsWith('```json')) jsonText = jsonText.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                    setTimelineData(JSON.parse(jsonText.trim()));
                } catch (err) { setTimelineError(`Chronological compilation failed: ${err.message}`); }
                finally { setIsGeneratingTimeline(false); }
            };

            const sendMessage = async (textOverride = null) => {
                const textToPass = (textOverride || input).trim();
                if (!textToPass || loading) return;
                if (!isApiConnected) { alert("Please connect system AI model config first."); setShowApiInput(true); return; }

                setInput(''); setHighlightData(null);
                setMessages(prev => [...prev, { role: 'user', text: textToPass }]);
                setLoading(true);

                const selectedDocs = docs.filter(doc => doc.isSelected);
                let parts = [];
                let medicalSystemPrompt = `You are a clinical decision support copilot acting in ${persona === 'patient' ? 'Layman Patient Mode' : 'Physician Mode'}.
                
                CRITICAL RESPONSE CONTROLS (STRICTLY ENFORCED):
                - KEEP RESPONSES EXTREMELY SHORT, DIRECT, AND SUMMARIZED. 
                - Target length: 100-150 words maximum. Avoid long paragraphs.
                - Use clear, simple, and highly understandable language. 
                - Limit formatting to a maximum of 2 short paragraphs or 3-4 concise, high-yield bullet points.
                - Answer ONLY the exact question asked. Do not dump general background clinical context.
                
                ROLE DIRECTIVES:
                - NEVER make up clinical assertions. Support statements using the text in active documents.
                - When referencing diagnostic tests, always use citation formats [[Document Name]] directly.
                - ${persona === 'patient' 
                    ? 'PATIENT LAYMAN MODE: Translate all metabolic indicators and complex medical terms into simple, day-to-day concepts or analogies.' 
                    : 'PHYSICIAN MODE: Keep it highly professional and clinical, but still short and high-yield.'}
                
                DISCLAIMER RULES:
                - End with this exact one-sentence disclaimer: "*Note: ClinicaLLM is an AI tool; verify findings with your doctor.*"\n\n`;

                if (selectedDocs.length > 0) {
                    medicalSystemPrompt += "--- ACTIVE CLINICAL CLINIC NOTES & LABS ---\n";
                    parts.push({ text: medicalSystemPrompt });
                    selectedDocs.forEach(doc => {
                        if (doc.type === 'pdf') {
                            parts.push({ text: `\n[Report: ${doc.name} (Attached as original PDF file)]\n` });
                            parts.push({ inlineData: { mimeType: 'application/pdf', data: doc.base64 } });
                        } else {
                            parts.push({ text: `\n[Report: ${doc.name}]\n${doc.content}\n` });
                        }
                    });
                    parts.push({ text: "\n--- END MEDICAL FILES ---\n\n" });
                } else {
                    parts.push({ text: "No health files attached. Standard informational response requested.\n\n" });
                }

                parts.push({ text: `Consultation Request: ${textToPass}` });

                try {
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts }] }) 
                    });
                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Unable to synthesize clinical answer.";
                    setMessages(prev => [...prev, { role: 'assistant', text: responseText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', text: `**System Communication Error:** ${err.message}` }]);
                } finally { setLoading(false); }
            };

            const handleFormSubmit = (e) => { e?.preventDefault(); sendMessage(); };

            const executeHighlightAction = () => {
                if (!highlightData) return;
                sendMessage(`Explain the following section from the medical report: "${highlightData.text}"`);
                setHighlightData(null);
            };

            // Preset fast actions
            const executeQuickAction = (actionType) => {
                if (!viewingDoc) return;
                setViewMode('document');
                const actionPromptMap = {
                    'summarize': `Summarize the clinical profile of: ${viewingDoc.name}. Focus on summarizing primary diagnostic outcomes in patient-friendly vocabulary.`,
                    'vitals': `Explain any elevated or deficient biomarkers / laboratory ranges found in: ${viewingDoc.name}, clarifying reference intervals and what each represents.`,
                    'actions': `What are the actionable diagnostic next steps, therapeutic lifestyle recommendations, or questions to ask the attending doctor based on: ${viewingDoc.name}?`
                };
                sendMessage(actionPromptMap[actionType]);
            };

            const onMmMouseDown = (e) => { setIsDragging(true); setDragStart({ x: e.clientX - mindmapPan.x * mindmapScale, y: e.clientY - mindmapPan.y * mindmapScale }); };
            const onMmMouseMove = (e) => { if (!isDragging) return; setMindmapPan({ x: (e.clientX - dragStart.x) / mindmapScale, y: (e.clientY - dragStart.y) / mindmapScale }); };
            const onMmMouseUp = () => setIsDragging(false);

            return (
                <div className="h-screen w-screen flex flex-col overflow-hidden transition-colors duration-200 font-sans">
                    
                    {/* Diagnostic disclaimer ticker bar */}
                    <div className="bg-amber-500/10 dark:bg-amber-500/5 text-amber-800 dark:text-amber-400 border-b border-amber-500/20 text-[11px] px-6 py-1.5 flex justify-between items-center shrink-0 z-30 font-medium">
                        <span className="flex items-center gap-1.5 truncate">
                            <AlertIcon className="w-3.5 h-3.5 clinical-pulse" /> 
                            <strong>EDUCATIONAL WORKSPACE ONLY:</strong> ClinicaLLM does not offer medical advice. Always cross-reference medical claims with licensed physicians.
                        </span>
                        <span className="hidden sm:inline">HIPAA Sandbox Mode</span>
                    </div>

                    {/* Header bar */}
                    <header className="h-14 bg-white dark:bg-[#121824] border-b border-clinical-border dark:border-slate-800 flex items-center justify-between px-6 shrink-0 z-20 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-clinical-teal text-white p-1.5 rounded">
                                <HeartPulseIcon className="w-5 h-5" />
                            </div>
                            <div>
                                <h1 className="text-base font-bold tracking-tight text-clinical-text dark:text-teal-400">ClinicaLLM</h1>
                                <p className="text-[10px] text-clinical-muted dark:text-slate-400 font-medium tracking-wide">MULTIDISCIPLINARY HEALTH CO-PILOT</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="flex items-center">
                                {showApiInput ? (
                                    <div className="flex items-center gap-2 border border-clinical-border dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-1 rounded">
                                        <input 
                                            type="password" placeholder="Gemini API Key..." value={apiKeyInput}
                                            onChange={(e) => setApiKeyInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && validateApiKey()}
                                            className="bg-transparent border-none focus:ring-0 text-xs text-clinical-text dark:text-white w-40 outline-none"
                                        />
                                        <button onClick={validateApiKey} disabled={isValidatingApi} className="text-[11px] bg-clinical-teal text-white px-2 py-0.5 rounded hover:bg-clinical-darkteal transition-colors disabled:opacity-50">
                                            {isValidatingApi ? '...' : 'Connect'}
                                        </button>
                                        <button onClick={bypassApiKey} className="text-[11px] text-slate-500 hover:text-slate-700 hover:underline">Use Free Platform AI</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowApiInput(true)} className="flex items-center gap-1.5 text-xs text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/30 px-3 py-1 rounded border border-emerald-200 dark:border-emerald-800 font-semibold shadow-sm">
                                        <ShieldCheckIcon className="w-3.5 h-3.5 text-emerald-500"/> Core Connected
                                    </button>
                                )}
                            </div>
                            
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="text-clinical-muted hover:text-clinical-text dark:text-slate-300 dark:hover:text-white" title="Toggle UI color theme">
                                {isDarkMode ? <SunIcon className="w-5 h-5" /> : <MoonIcon className="w-5 h-5" />}
                            </button>
                        </div>
                    </header>

                    {/* Main clinical workspace */}
                    <main className="flex flex-1 overflow-hidden bg-clinical-sidebar dark:bg-[#111827]">
                        
                        {}
                        {/* Active medical records panel */}
                        <aside className="w-[300px] bg-white dark:bg-[#111827] border-r border-clinical-border dark:border-slate-800 flex flex-col shrink-0 overflow-hidden z-10">
                            <div className="p-4 border-b border-clinical-border dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60">
                                <input type="file" id="health-files" multiple accept=".txt,.md,.csv,.json,application/pdf" onChange={handleFileUpload} className="hidden" ref={fileInputRef} />
                                <button 
                                    onClick={() => fileInputRef.current?.click()} 
                                    className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-clinical-teal hover:bg-clinical-darkteal text-white rounded text-xs font-semibold shadow-sm transition-colors cursor-pointer"
                                >
                                    <UploadIcon className="w-4 h-4" /> Upload Health Files
                                </button>
                                <p className="text-[10px] text-clinical-muted dark:text-slate-500 text-center mt-2 font-mono">Accepts PDF clinical charts, TXT labs, MD imaging</p>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-3 space-y-4">
                                <div>
                                    <div className="px-2 pb-2 text-[10px] font-bold text-clinical-muted dark:text-slate-500 uppercase tracking-wider flex justify-between">
                                        <span>Patient Dossier Context</span>
                                        <span>{docs.filter(d => d.isSelected).length} Checked</span>
                                    </div>

                                    {docs.length === 0 ? (
                                        <div className="text-center text-xs text-clinical-muted dark:text-slate-500 py-8 italic">
                                            No diagnostic charts added yet. Use "Upload" to begin.
                                        </div>
                                    ) : (
                                        <div className="space-y-1.5">
                                            {docs.map(doc => (
                                                <div key={doc.id} onClick={() => { setViewingDocId(doc.id); setViewMode('document'); }}
                                                    className={`group flex items-start gap-2.5 p-2.5 rounded border transition-all cursor-pointer ${viewingDocId === doc.id ? 'bg-teal-50/70 dark:bg-teal-950/20 border-clinical-teal' : 'border-transparent hover:bg-slate-50 dark:hover:bg-slate-800/40'}`}
                                                >
                                                    <input 
                                                        type="checkbox" 
                                                        checked={doc.isSelected} 
                                                        onChange={() => toggleDocSelection(doc.id)} 
                                                        onClick={(e) => e.stopPropagation()} 
                                                        className="mt-1 cursor-pointer accent-clinical-teal w-3.5 h-3.5 rounded border-slate-300 text-clinical-teal focus:ring-clinical-teal" 
                                                    />
                                                    <div className="flex-1 min-w-0">
                                                        <p className={`text-xs font-semibold truncate ${viewingDocId === doc.id ? 'text-clinical-teal font-bold' : 'text-slate-700 dark:text-slate-200'}`}>{doc.name}</p>
                                                        <div className="flex items-center gap-2 mt-0.5">
                                                            <span className="text-[9px] text-clinical-muted dark:text-slate-400 font-mono uppercase bg-slate-100 dark:bg-slate-800 px-1 py-0.2 rounded font-semibold">{doc.type}</span>
                                                            {doc.id.startsWith('mock-') && (
                                                                <span className="text-[9px] text-amber-700 bg-amber-50 dark:text-amber-300 dark:bg-amber-950/30 px-1 py-0.2 rounded font-semibold">Sandbox Sample</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteDoc(doc.id); }} className="text-slate-400 hover:text-rose-500 opacity-0 group-hover:opacity-100 p-1 transition-all">
                                                        <TrashIcon className="w-3.5 h-3.5" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </aside>

                        {}
                        {/* Middle display and processing hub */}
                        <section className={`flex-1 bg-[#f8fafc] dark:bg-[#0f172a] flex flex-col min-w-0 border-r border-clinical-border dark:border-slate-800 transition-all duration-300 relative ${isFullScreen ? 'fixed inset-0 z-[100]' : ''} ${flashViewer ? 'ring-2 ring-clinical-teal' : ''}`}>
                            
                            {/* Ask AI Popup selection helper */}
                            {highlightData && viewMode === 'document' && (
                                <div className="absolute z-50 animate-in fade-in zoom-in duration-100 shadow-lg border border-clinical-teal/40 rounded bg-white dark:bg-slate-800" style={{ top: highlightData.top, left: highlightData.left }}>
                                    <button onClick={executeHighlightAction} className="flex items-center gap-1.5 bg-[#0f172a] dark:bg-slate-100 text-white dark:text-slate-900 px-3 py-1.5 text-xs hover:bg-clinical-teal dark:hover:bg-clinical-teal dark:hover:text-white transition-colors rounded">
                                        <SparklesIcon className="w-3.5 h-3.5" /> Query Selection
                                    </button>
                                </div>
                            )}

                            {/* View selector and quick clinical toggles */}
                            <div className="flex flex-col border-b border-clinical-border dark:border-slate-800 bg-white dark:bg-slate-900 shrink-0 z-10">
                                <div className="h-12 flex items-center justify-between px-4">
                                    <div className="flex gap-2 h-full pt-1">
                                        <button onClick={() => setViewMode('document')} className={`px-4 pb-2 text-xs font-semibold border-b-2 transition-colors flex items-center gap-2 ${viewMode === 'document' ? 'border-clinical-teal text-clinical-teal' : 'border-transparent text-clinical-muted hover:text-clinical-text dark:text-slate-400 dark:hover:text-white'}`}>
                                            <ClipboardIcon className="w-4 h-4" /> Report View
                                        </button>
                                        <button onClick={() => setViewMode('biomarker_graph')} className={`px-4 pb-2 text-xs font-semibold border-b-2 transition-colors flex items-center gap-2 ${viewMode === 'biomarker_graph' ? 'border-clinical-teal text-clinical-teal' : 'border-transparent text-clinical-muted hover:text-clinical-text dark:text-slate-400 dark:hover:text-white'}`}>
                                            <NetworkIcon className="w-4 h-4" /> Biomarker Graph
                                        </button>
                                        <button onClick={() => setViewMode('treatment_timeline')} className={`px-4 pb-2 text-xs font-semibold border-b-2 transition-colors flex items-center gap-2 ${viewMode === 'treatment_timeline' ? 'border-clinical-teal text-clinical-teal' : 'border-transparent text-clinical-muted hover:text-clinical-text dark:text-slate-400 dark:hover:text-white'}`}>
                                            <ClockIcon className="w-4 h-4" /> Care Journey Timeline
                                        </button>
                                    </div>
                                    
                                    <div className="flex items-center gap-3">
                                        {viewMode === 'document' && viewingDoc && viewingDoc.type === 'pdf' && pdfNumPages > 0 && (
                                            <div className="flex items-center gap-2 text-xs text-clinical-muted dark:text-slate-400 border border-clinical-border dark:border-slate-700 bg-white dark:bg-slate-800 px-2 py-0.5 rounded">
                                                <button disabled={pdfPageNum <= 1} onClick={() => setPdfPageNum(p => p - 1)} className="p-0.5 hover:bg-slate-100 dark:hover:bg-slate-700 disabled:opacity-30"><ChevronLeftIcon /></button>
                                                <span>Pg {pdfPageNum} / {pdfNumPages}</span>
                                                <button disabled={pdfPageNum >= pdfNumPages} onClick={() => setPdfPageNum(p => p + 1)} className="p-0.5 hover:bg-slate-100 dark:hover:bg-slate-700 disabled:opacity-30"><ChevronRightIcon /></button>
                                            </div>
                                        )}
                                        
                                        {viewMode === 'biomarker_graph' && mindmapData && (
                                            <div className="flex items-center gap-3 pr-3">
                                                <div className="flex items-center text-xs bg-white dark:bg-[#111827] border border-clinical-border dark:border-slate-700 rounded overflow-hidden">
                                                    <button onClick={() => setMindmapScale(s => Math.max(0.4, s - 0.1))} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-clinical-muted dark:text-slate-400 border-r border-clinical-border dark:border-slate-700"><ZoomOutIcon className="w-3.5 h-3.5" /></button>
                                                    <span className="px-2 w-10 text-center font-mono">{Math.round(mindmapScale * 100)}%</span>
                                                    <button onClick={() => setMindmapScale(s => Math.min(2.5, s + 0.1))} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-clinical-muted dark:text-slate-400 border-l border-clinical-border dark:border-slate-700"><ZoomInIcon className="w-3.5 h-3.5" /></button>
                                                </div>
                                                <button onClick={generateMindmap} className="px-3 py-1 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-clinical-border dark:border-slate-700 text-xs rounded text-clinical-teal font-bold shadow-sm transition-colors">
                                                    Regenerate Graph
                                                </button>
                                            </div>
                                        )}

                                        {viewMode === 'treatment_timeline' && timelineData && (
                                            <button onClick={generateTimeline} className="px-3 py-1 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-clinical-border dark:border-slate-700 text-xs rounded text-clinical-teal font-bold shadow-sm transition-colors">
                                                Recompile Timeline
                                            </button>
                                        )}

                                        <button onClick={() => setIsFullScreen(!isFullScreen)} className="text-clinical-muted hover:text-clinical-text dark:text-slate-400 dark:hover:text-white transition-colors" title={isFullScreen ? "Exit Fullscreen" : "Fullscreen"}>
                                            {isFullScreen ? <MinimizeIcon className="w-4 h-4" /> : <MaximizeIcon className="w-4 h-4" />}
                                        </button>
                                    </div>
                                </div>
                                
                                {viewMode === 'document' && viewingDoc && (
                                    <div className="px-4 py-1.5 flex items-center gap-2 overflow-x-auto bg-slate-50 dark:bg-slate-900 border-t border-clinical-border dark:border-slate-800">
                                        <span className="text-[9px] text-clinical-muted dark:text-slate-500 uppercase tracking-widest font-bold mr-2">Clinical Diagnostics</span>
                                        <button onClick={() => executeQuickAction('summarize')} className="text-xs text-clinical-link dark:text-sky-400 hover:underline font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-2.5 py-0.5 rounded shadow-sm">Patient-Friendly Abstract</button>
                                        <button onClick={() => executeQuickAction('vitals')} className="text-xs text-clinical-link dark:text-sky-400 hover:underline font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-2.5 py-0.5 rounded shadow-sm">Interpret Out-Of-Range Metrics</button>
                                        <button onClick={() => executeQuickAction('actions')} className="text-xs text-clinical-link dark:text-sky-400 hover:underline font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-2.5 py-0.5 rounded shadow-sm">Doctor Question Checklist</button>
                                    </div>
                                )}
                            </div>

                            {}
                            {/* Document Viewer Screen */}
                            {viewMode === 'document' && (
                                <div className="flex-1 overflow-auto bg-[#f8fafc] dark:bg-[#0f172a] p-6 w-full relative" onMouseUp={handleMouseUp}>
                                    {!viewingDoc ? (
                                        <div className="h-full flex flex-col items-center justify-center text-clinical-muted dark:text-slate-500 gap-3">
                                            <ClipboardIcon className="w-10 h-10 opacity-30" />
                                            <p className="font-semibold text-xs text-center">Select or upload a report from the patient registry profile.</p>
                                        </div>
                                    ) : viewingDoc.type === 'pdf' ? (
                                        <div className="max-w-4xl mx-auto flex flex-col items-center w-full shadow-lg rounded bg-white dark:bg-[#111827]">
                                            {pdfLoading ? (
                                                <div className="flex flex-col items-center gap-3 py-24 text-clinical-muted dark:text-slate-400">
                                                    <LoaderIcon className="w-6 h-6 text-clinical-teal" />
                                                    <p className="text-xs font-mono">Decoding clinical PDF vector map...</p>
                                                </div>
                                            ) : pdfError ? (
                                                <div className="flex flex-col items-center gap-2 p-12 text-rose-500 border border-rose-100 bg-rose-50 dark:bg-rose-950/20 text-center rounded">
                                                    <p className="font-semibold text-sm">{pdfError}</p>
                                                </div>
                                            ) : (
                                                <canvas ref={canvasRef} className="max-w-full bg-white shadow-sm border border-slate-200 dark:border-slate-800 rounded" />
                                            )}
                                        </div>
                                    ) : (
                                        <div className="max-w-3xl mx-auto bg-white dark:bg-[#111827] border border-clinical-border dark:border-slate-800 p-8 min-h-full shadow-sm rounded text-clinical-text dark:text-slate-200 selection:bg-teal-100 dark:selection:bg-teal-950/40">
                                            {viewingDoc.type === 'markdown' ? <SimpleClinicalMarkdown content={viewingDoc.content} /> : <pre className="whitespace-pre-wrap font-mono text-[12px] leading-relaxed">{viewingDoc.content}</pre>}
                                        </div>
                                    )}
                                </div>
                            )}

                            {}
                            {/* Biomarker Bio-conceptual Map */}
                            {viewMode === 'biomarker_graph' && (
                                <div className="flex-1 bg-[#f1f5f9] dark:bg-[#0f172a] w-full flex flex-col relative overflow-hidden shadow-inner">
                                    {!mindmapData && !isGeneratingMindmap && (
                                        <div className="h-full flex flex-col items-center justify-center gap-4 max-w-sm mx-auto text-center">
                                            <NetworkIcon className="w-12 h-12 text-clinical-teal/40 dark:text-teal-400/30" />
                                            <div>
                                                <h3 className="text-sm font-bold text-clinical-text dark:text-slate-200">Biological Mapping Module</h3>
                                                <p className="text-xs text-clinical-muted dark:text-slate-400 mt-1">Synthesize an active spatial graph linking lab values, clinical concerns, and anatomic structures from your documents.</p>
                                            </div>
                                            <button onClick={generateMindmap} className="px-6 py-2 bg-clinical-teal hover:bg-clinical-darkteal text-white font-bold rounded text-xs shadow-md transition-colors cursor-pointer">
                                                Synthesize Biomarker Graph
                                            </button>
                                            {mindmapError && <p className="text-xs font-bold text-rose-500 mt-2">{mindmapError}</p>}
                                        </div>
                                    )}
                                    {isGeneratingMindmap && (
                                        <div className="h-full flex flex-col items-center justify-center gap-3 text-clinical-muted dark:text-slate-400 font-mono text-xs">
                                            <LoaderIcon className="w-6 h-6 text-clinical-teal" />
                                            <p className="animate-pulse">Analyzing pathophysiological correlates...</p>
                                        </div>
                                    )}
                                    {mindmapData && !isGeneratingMindmap && (
                                        <div 
                                            className={`w-full h-full overflow-hidden mindmap-container ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                            onMouseDown={onMmMouseDown} onMouseMove={onMmMouseMove} onMouseUp={onMmMouseUp} onMouseLeave={onMmMouseUp}
                                        >
                                            <div 
                                                className="w-full h-full min-w-max min-h-max flex items-center justify-center p-20 transition-transform duration-75"
                                                style={{ transform: `scale(${mindmapScale}) translate(${mindmapPan.x}px, ${mindmapPan.y}px)`, transformOrigin: 'center' }}
                                            >
                                                <MindmapNode node={mindmapData} />
                                            </div>
                                            <div className="absolute bottom-4 left-4 text-[10px] text-clinical-muted dark:text-slate-500 font-mono bg-white/80 dark:bg-slate-900/80 px-2 py-1 rounded">
                                                💡 Drag to slide. Hover circles to trace descriptions.
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {}
                            {/* Chronological Care Journey Timeline */}
                            {viewMode === 'treatment_timeline' && (
                                <div className="flex-1 bg-slate-50 dark:bg-[#111827] w-full flex flex-col overflow-y-auto p-6">
                                    {!timelineData && !isGeneratingTimeline && (
                                        <div className="h-full flex flex-col items-center justify-center gap-4 max-w-sm mx-auto text-center">
                                            <ClockIcon className="w-12 h-12 text-clinical-teal/40 dark:text-teal-400/30" />
                                            <div>
                                                <h3 className="text-sm font-bold text-clinical-text dark:text-slate-200">Chronological Care Synthesis</h3>
                                                <p className="text-xs text-clinical-muted dark:text-slate-400 mt-1">Convert patient records, scans, and treatments into a simplified diagnostic pathway.</p>
                                            </div>
                                            <button onClick={generateTimeline} className="px-6 py-2 bg-clinical-teal hover:bg-clinical-darkteal text-white font-bold rounded text-xs shadow-md transition-colors cursor-pointer">
                                                Compile Timeline Path
                                            </button>
                                            {timelineError && <p className="text-xs font-bold text-rose-500 mt-2">{timelineError}</p>}
                                        </div>
                                    )}
                                    {isGeneratingTimeline && (
                                        <div className="h-full flex flex-col items-center justify-center gap-3 text-clinical-muted dark:text-slate-400 font-mono text-xs">
                                            <LoaderIcon className="w-6 h-6 text-clinical-teal" />
                                            <p className="animate-pulse">Sequencing milestone chronology...</p>
                                        </div>
                                    )}
                                    {timelineData && !isGeneratingTimeline && (
                                        <div className="max-w-3xl mx-auto w-full py-8">
                                            <div className="mb-6 text-center">
                                                <h2 className="text-lg font-bold text-clinical-text dark:text-slate-200">Synthesized Care Pathway</h2>
                                                <p className="text-xs text-clinical-muted dark:text-slate-400">Extracted from checked health context</p>
                                            </div>
                                            
                                            <div className="relative border-l-2 border-clinical-teal ml-4 pl-8 space-y-8">
                                                {timelineData.map((item, index) => (
                                                    <div key={index} className="relative">
                                                        {/* Circle milestone */}
                                                        <span className="absolute -left-[41px] top-1 bg-clinical-teal text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-md">
                                                            {index + 1}
                                                        </span>
                                                        
                                                        <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/60 p-4 rounded shadow-sm hover:shadow-md transition-shadow">
                                                            <div className="flex flex-wrap justify-between items-start gap-1.5 mb-2">
                                                                <span className="text-[10px] uppercase font-bold text-clinical-teal dark:text-teal-400 tracking-wider bg-teal-50 dark:bg-teal-950/30 px-2 py-0.5 rounded">
                                                                    {item.phase}
                                                                </span>
                                                                <span className="text-xs font-mono text-clinical-muted dark:text-slate-400 font-semibold">
                                                                    {item.date}
                                                                </span>
                                                            </div>
                                                            
                                                            <h4 className="text-sm font-bold text-slate-800 dark:text-slate-100 font-sans mb-2">
                                                                {item.milestone}
                                                            </h4>
                                                            
                                                            <ul className="space-y-1">
                                                                {item.details.map((detail, dIdx) => (
                                                                    <li key={dIdx} className="text-xs text-slate-600 dark:text-slate-300 flex items-start">
                                                                        <span className="text-clinical-teal mr-2">•</span>
                                                                        <span>{detail}</span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>

                        {}
